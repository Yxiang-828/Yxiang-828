<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Yao Xiang - From silicon to systems</title>
  <desc id="desc">Dark portfolio-style banner for AI systems, agent infrastructure, robotics, and low-level programming.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="58%" stop-color="#080a10"/>
      <stop offset="100%" stop-color="#12070d"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="28%" cy="28%" r="54%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="82%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#ff1e56" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff1e56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff1e56"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 3.5 H4" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <clipPath id="clip">
      <rect width="1200" height="360" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1200" height="360" fill="url(#bg)"/>
    <rect width="1200" height="360" fill="url(#cyanGlow)"/>
    <rect width="1200" height="360" fill="url(#redGlow)"/>
    <rect width="1200" height="360" fill="url(#scan)"/>

    <path d="M-40 96 C170 124 350 70 550 106 C735 139 928 87 1240 112" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="34"/>
    <path d="M-40 258 C182 296 360 252 560 278 C784 307 940 253 1240 278" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="32"/>

    <g transform="translate(76 64)">
      <text x="0" y="0" fill="#ff1e56" font-family="Bebas Neue, Impact, Arial Narrow, Arial, sans-serif" font-size="30" letter-spacing="3">YAO XIANG</text>
      <rect x="0" y="18" width="534" height="2" fill="url(#rule)" opacity="0.95"/>

      <text x="0" y="94" fill="#f0f0f0" font-family="Bebas Neue, Impact, Arial Narrow, Arial, sans-serif" font-size="72" letter-spacing="2">FROM</text>
      <text x="0" y="162" fill="#ff1e56" font-family="Bebas Neue, Impact, Arial Narrow, Arial, sans-serif" font-size="72" letter-spacing="2">SILICON</text>
      <text x="0" y="230" fill="#f0f0f0" font-family="Bebas Neue, Impact, Arial Narrow, Arial, sans-serif" font-size="72" letter-spacing="2">TO <tspan fill="#00e5ff">SYSTEMS</tspan></text>
    </g>

    <g transform="translate(696 92)">
      <text x="0" y="0" fill="#00e5ff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="2">INTELLIGENCE LAYER</text>
      <text x="0" y="34" fill="#f0f0f0" fill-opacity="0.76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">ML, vision, local inference, agent architectures</text>

      <text x="0" y="92" fill="#00e5ff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="2">HARDWARE LAYER</text>
      <text x="0" y="126" fill="#f0f0f0" fill-opacity="0.76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">robotics, embedded systems, C/C++, assembly</text>

      <text x="0" y="184" fill="#00e5ff" font-family="JetBrains Mono, Cascadia Code, Consolas, monospace" font-size="16" font-weight="700" letter-spacing="2">CURRENT FOCUS</text>
      <text x="0" y="218" fill="#f0f0f0" fill-opacity="0.76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">AI systems for real-world hardware</text>
    </g>

    <rect x="-180" y="316" width="240" height="2" fill="url(#rule)" opacity="0.85">
      <animate attributeName="x" values="-220;1220" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
